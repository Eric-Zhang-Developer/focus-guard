<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Guard</title>
    <link rel="stylesheet" href="/src/blocked.css" />
    <style>
      body {
        background:
          radial-gradient(ellipse 80% 40% at 50% -10%, rgba(251, 191, 36, 0.15), transparent),
          #020617;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center font-sans">
    <main class="w-full max-w-lg mx-6 px-10 py-9 rounded-2xl border border-white/10 bg-slate-900/75 backdrop-blur-sm shadow-2xl">

      <!-- Header row: red dot + domain -->
      <div class="flex items-center gap-3 mb-5">
        <span class="shrink-0 w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_2px_rgba(239,68,68,0.5)]"></span>
        <h1
          id="domain"
          class="font-mono text-3xl font-bold text-white tracking-tight truncate"
        >—</h1>
      </div>

      <!-- Block window info (hidden until JS populates) -->
      <div id="window-info" class="hidden mb-6">
        <p class="text-sm text-slate-400 tracking-wide">
          <span id="window-label"></span>
          <span class="mx-1.5 text-slate-600">·</span>
          <span id="window-end"></span>
        </p>
      </div>

      <hr class="border-white/8 mb-6" />

      <!-- Motivational line -->
      <p class="text-slate-500 italic text-sm leading-relaxed">
        You set this up for a reason.
      </p>

    </main>
    <script type="module" src="/src/blocked.ts"></script>
  </body>
</html>
