<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Guard</title>
    <script type="module" src="./popup.ts"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Mono", "Menlo", monospace;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #020617;
        color: #f8fafc;
      }

      main {
        min-height: 384px;
        padding: 20px;
        background:
          radial-gradient(circle at top, rgba(251, 146, 60, 0.24), transparent 38%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      section {
        border: 1px solid rgba(51, 65, 85, 0.9);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.82);
        padding: 20px;
        box-shadow: 0 25px 60px rgba(2, 6, 23, 0.4);
      }

      p,
      h1 {
        margin: 0;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #fdba74;
      }

      h1 {
        margin-top: 12px;
        font-size: 28px;
        letter-spacing: -0.04em;
      }

      .copy {
        margin-top: 12px;
        font-size: 14px;
        line-height: 1.7;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">Phase 0</p>
        <h1>Focus Guard</h1>
        <p class="copy">
          Popup interaction ships in Phase 4. This placeholder confirms the popup entrypoint and Tailwind pipeline are wired correctly.
        </p>
      </section>
    </main>
  </body>
</html>
