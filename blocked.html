<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Guard</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Mono", "Menlo", monospace;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(253, 186, 116, 0.22), transparent 40%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
        color: #e2e8f0;
      }

      main {
        width: min(560px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 30px 80px rgba(2, 6, 23, 0.4);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }

      p {
        margin-top: 12px;
        line-height: 1.6;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Focus Guard is active.</h1>
      <p>Blocked-page details arrive in Phase 3. This placeholder confirms MV3 redirects can target an extension page.</p>
    </main>
  </body>
</html>
